version: '3.9'

services:
  # ==================== DATABASE MYSQL ====================
  db:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: db_Vite_et_Gourmand
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== PHP ====================
  php:
    build: 
      context: .
      dockerfile: ./Dockerfile
    container_name: php-container
    restart: always
    volumes:
      - ./backend:/var/www/backend
      - ./backend/vendor:/var/www/backend/vendor
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=db_Vite_et_Gourmand
      - MONGO_URI=${MONGODB_URI:-mongodb://admin:password123@mongodb:27017/myapp?authSource=admin}

  # ==================== NGINX ====================
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-container
    restart: always
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend:/var/www/frontend
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== PHPMYADMIN (dev only) ====================
  phpmyadmin:
    image: phpmyadmin:5.2 
    container_name: phpmyadmin-container
    restart: always
    profiles: ["dev"]
    ports:
      - "${PHPMYADMIN_PORT:-8082}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-root}
      PMA_ARBITRARY: 1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ==================== MONGODB ====================
  mongodb:
    image: mongo:7.0
    container_name: mongodb-container
    restart: always
    
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-myapp}
    
    ports:
      - "${MONGO_PORT:-27017}:27017"
    
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
    
    networks:
      - app-network
    
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test -u $${MONGO_ROOT_USER} -p $${MONGO_ROOT_PASSWORD} --authenticationDatabase admin
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MONGO EXPRESS (Interface Web) ====================
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express-container
    restart: always
    profiles: ["dev"]
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-password123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password123}@mongodb:27017/
      ME_CONFIG_BASICAUTH: 'false'
    
    ports:
      - "${MONGO_EXPRESS_PORT:-8083}:8081"
    
    depends_on:
      mongodb:
        condition: service_healthy
    
    networks:
      - app-network

# ==================== VOLUMES ====================
volumes:
  db-data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# ==================== NETWORKS ====================
networks:
  app-network:
    driver: bridge